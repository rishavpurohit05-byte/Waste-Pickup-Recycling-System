{% extends "base.html" %}
{% block content %}
<h2>All Users</h2>
<table class="table table-striped">
    <thead><tr><th>ID</th><th>Name</th><th>Email</th><th>Phone</th><th>Role</th><th>Points</th><th>Joined</th></tr></thead>
    <tbody>
    {% for u in users %}
    <tr>
        <td>{{ u.id }}</td><td>{{ u.name }}</td><td>{{ u.email }}</td><td>{{ u.phone }}</td>
        <td><span class="badge bg-secondary">{{ u.role }}</span></td><td>{{ u.points }}</td>
        <td>{{ u.created_at.strftime('%Y-%m-%d') }}</td>
    </tr>
    {% endfor %}
    </tbody>
</table>
{% endblock %}
