<!-- templates/login.html -->
{% extends "base.html" %}
{% block content %}
<style>
    .login-container {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 70vh;
    }

    .login-card {
        width: 100%;
        max-width: 450px;
        border: none;
        border-radius: 15px;
        box-shadow: 0 15px 35px rgba(0,0,0,0.15);
        overflow: hidden;
    }

    .login-header {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        padding: 40px 30px;
        text-align: center;
        color: white;
    }

    .login-header h4 {
        margin: 0;
        font-weight: 700;
        font-size: 1.8rem;
    }

    .login-header i {
        font-size: 2.5rem;
        margin-bottom: 15px;
        display: block;
    }

    .form-floating > label {
        color: #7f8c8d;
    }

    .form-control {
        border-radius: 8px;
        border: 1px solid #e0e0e0;
        padding: 12px 15px;
        font-size: 1rem;
        transition: all 0.3s ease;
    }

    .form-control:focus {
        border-color: #667eea;
        box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .btn-login {
        background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
        border: none;
        padding: 12px 0;
        font-weight: 600;
        font-size: 1rem;
        border-radius: 8px;
        transition: all 0.3s ease;
        color: white;
    }

    .btn-login:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(46, 204, 113, 0.3);
        color: white;
    }

    .btn-login:active {
        transform: translateY(0);
    }

    .divider {
        text-align: center;
        position: relative;
        margin: 20px 0;
        color: #bdc3c7;
        font-weight: 500;
    }

    .divider::before,
    .divider::after {
        content: '';
        position: absolute;
        top: 50%;
        width: 48%;
        height: 1px;
        background: #e0e0e0;
    }

    .divider::before {
        left: 0;
    }

    .divider::after {
        right: 0;
    }

    .login-footer {
        text-align: center;
        padding: 20px;
        border-top: 1px solid #f0f0f0;
    }

    .login-footer p {
        margin: 8px 0;
        font-size: 0.95rem;
    }

    .login-footer a {
        color: #667eea;
        font-weight: 600;
        text-decoration: none;
    }

    .login-footer a:hover {
        color: #764ba2;
        text-decoration: underline;
    }

    .demo-info {
        background: #f0f7ff;
        border: 1px solid #b3d9ff;
        border-radius: 8px;
        padding: 12px 15px;
        margin-top: 15px;
        font-size: 0.85rem;
        color: #0c5460;
    }

    .demo-info strong {
        display: block;
        margin-bottom: 8px;
        color: #003d5c;
    }

    .demo-info code {
        background: white;
        padding: 2px 6px;
        border-radius: 4px;
        font-family: 'Courier New', monospace;
    }

    .role-badge {
        display: inline-block;
        background: #667eea;
        color: white;
        padding: 2px 8px;
        border-radius: 12px;
        font-size: 0.75rem;
        margin-left: 5px;
    }

    .role-badge.admin {
        background: #e74c3c;
    }

    .role-badge.collector {
        background: #f39c12;
    }
</style>

<div class="login-container">
    <div class="login-card">
        <div class="login-header">
            <i class="fas fa-sign-in-alt"></i>
            <h4>Welcome Back</h4>
        </div>

        <div class="card-body p-4">
            <form method="POST" id="loginForm">
                <div class="mb-3">
                    <label for="email" class="form-label"><strong>Email Address</strong></label>
                    <div class="input-group">
                        <span class="input-group-text" style="border: none; background: transparent;">
                            <i class="fas fa-envelope" style="color: #667eea;"></i>
                        </span>
                        <input type="email" class="form-control" id="email" name="email" placeholder="Enter your email" required>
                    </div>
                </div>

                <div class="mb-4">
                    <label for="password" class="form-label"><strong>Password</strong></label>
                    <div class="input-group">
                        <span class="input-group-text" style="border: none; background: transparent;">
                            <i class="fas fa-lock" style="color: #667eea;"></i>
                        </span>
                        <input type="password" class="form-control" id="password" name="password" placeholder="Enter your password" required>
                    </div>
                </div>

                <button type="submit" class="btn btn-login w-100">
                    <i class="fas fa-sign-in-alt me-2"></i>Sign In
                </button>
            </form>

            <div class="divider">or</div>

            <p class="text-center text-muted mb-3">New to WastePickup?</p>
            <a href="/register" class="btn btn-outline-primary w-100">
                <i class="fas fa-user-plus me-2"></i>Create Account
            </a>
        </div>

        <div class="login-footer">
            <p class="mb-2"><strong>Demo Accounts:</strong></p>
            <p class="mb-1">
                <strong>Admin:</strong> 
                <code>admin@waste.com</code>
                <span class="role-badge admin">Admin</span>
            </p>
            <p class="mb-0">
                <strong>Collector:</strong> 
                <code>collector@waste.com</code>
                <span class="role-badge collector">Collector</span>
            </p>
            <p class="text-muted mt-2" style="font-size: 0.8rem;">Password: <code>admin123</code> / <code>collector123</code></p>
        </div>
    </div>
</div>

<script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        
        if (!email || !password) {
            e.preventDefault();
            alert('Please fill in all fields');
        }
    });
</script>
{% endblock %}
